
framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false

    #  Idioma por defecto
    default_locale: es

    translator:
        default_path: '%kernel.project_dir%/translations'
        fallbacks: ['es']

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    php_errors:
        log: true

when@test:
    framework:
        test: true
        
        default_locale: es
        translator:
            default_path: '%kernel.project_dir%/translations'
            fallbacks: ['es']
        session:
            storage_factory_id: session.storage.factory.mock_file